<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Поиск городов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <!-- Навигация -->
    <nav class="navbar navbar-dark bg-dark rounded">
        <span class="navbar-brand">Weather App</span>
        <div th:if="${user != null}">
            <span th:text="${user.login}" class="text-white me-3"></span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
        <div th:unless="${user != null}">
            <a th:href="@{/login}" class="btn btn-outline-light me-2">Войти</a>
            <a th:href="@{/register}" class="btn btn-light">Регистрация</a>
        </div>
    </nav>

    <!-- Форма поиска -->
    <form th:action="@{/search}" method="get" class="my-3">
        <div class="input-group">
            <input type="text" name="city" class="form-control" th:value="${searchCity}" placeholder="Введите город" required>
            <button class="btn btn-primary" type="submit">Искать</button>
        </div>
    </form>

    <!-- Результаты -->
    <h2>Результаты поиска по запросу: <span th:text="${searchCity}"></span></h2>
    <div th:if="${cities.empty}" class="alert alert-warning">Ничего не найдено</div>
    <div th:unless="${cities.empty}">
        <ul class="list-group">
            <li th:each="city : ${cities}" class="list-group-item d-flex justify-content-between align-items-center">
                <span th:text="${city.name} + ', ' + ${city.country}"></span>
                <form th:action="@{/add-location}" method="post" class="mb-0">
                    <input type="hidden" name="name" th:value="${city.name}">
                    <input type="hidden" name="lat" th:value="${city.latitude}">
                    <input type="hidden" name="lon" th:value="${city.longitude}">
                    <button type="submit" class="btn btn-success btn-sm">Добавить</button>
                </form>
            </li>
        </ul>
    </div>
    <a href="/" class="btn btn-secondary mt-3">На главную</a>
</div>
</body>
</html>
